  # ── Information Theory ──────────────────────────────────────────────
  - node_id: "information-theory"
    corpus_dir: "information_theory"
    state: "Live"
    metadata:
      description: "Shannon entropy, channel capacity, error correction, data compression"
      persona: "professor"
    corpus_files:
      - "shannon_entropy.txt"
      - "channel_capacity.txt"
      - "mutual_information.txt"
      - "source_coding_theorem.txt"
      - "data_compression.txt"

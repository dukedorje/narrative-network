  # ── Recursion ───────────────────────────────────────────────────────
  - node_id: "recursion"
    corpus_dir: "recursion"
    state: "Live"
    metadata:
      description: "Recursive structures: fundamentals, divide-and-conquer, dynamic programming"
      persona: "professor"
    corpus_files:

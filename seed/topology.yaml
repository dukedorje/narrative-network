# Seed topology for Narrative Network — 16 nodes across 13 knowledge domains
# The quantum mechanics domain retains its 4 sub-nodes; other domains are single nodes.
# Edge weights reflect conceptual proximity between domains.

nodes:
  # ── Quantum Mechanics (4 sub-nodes) ──────────────────────────────────
  - node_id: "quantum-foundations"
    corpus_dir: "quantum_mechanics"
    state: "Live"
    metadata:
      description: "Core quantum mechanics: wave functions, superposition, uncertainty"
      persona: "professor"
    corpus_files:
      - "wave_functions.txt"
      - "superposition_and_measurement.txt"
      - "uncertainty_principle.txt"

  - node_id: "quantum-phenomena"
    corpus_dir: "quantum_mechanics"
    state: "Live"
    metadata:
      description: "Observable quantum effects: double slit, tunneling, entanglement"
      persona: "experimentalist"
    corpus_files:
      - "double_slit_experiment.txt"
      - "quantum_tunneling.txt"
      - "quantum_entanglement.txt"

  - node_id: "quantum-interpretations"
    corpus_dir: "quantum_mechanics"
    state: "Live"
    metadata:
      description: "Interpretive frameworks: Copenhagen, many-worlds, decoherence"
      persona: "philosopher"
    corpus_files:
      - "copenhagen_interpretation.txt"
      - "many_worlds_interpretation.txt"
      - "quantum_decoherence.txt"

  - node_id: "quantum-bridge"
    corpus_dir: "quantum_mechanics"
    state: "Live"
    metadata:
      description: "Angular momentum and spin — bridges foundations to phenomena"
      persona: "neutral"
    corpus_files:
      - "spin_and_angular_momentum.txt"

  # ── Relativity ───────────────────────────────────────────────────────
  - node_id: "relativity"
    corpus_dir: "relativity"
    state: "Live"
    metadata:
      description: "Special and general relativity: spacetime, mass-energy, gravitational waves"
      persona: "professor"
    corpus_files:
      - "special_relativity_postulates.txt"
      - "general_relativity_overview.txt"
      - "spacetime_geometry.txt"
      - "time_dilation.txt"
      - "length_contraction.txt"
      - "mass_energy_equivalence.txt"
      - "gravitational_waves.txt"
      - "black_holes_and_singularities.txt"

  # ── Thermodynamics ──────────────────────────────────────────────────
  - node_id: "thermodynamics"
    corpus_dir: "thermodynamics"
    state: "Live"
    metadata:
      description: "Laws of thermodynamics, entropy, statistical mechanics, phase transitions"
      persona: "professor"
    corpus_files:
      - "zeroth_and_first_laws.txt"
      - "second_law_entropy.txt"
      - "carnot_cycle.txt"
      - "thermodynamic_potentials.txt"
      - "statistical_mechanics_foundations.txt"
      - "phase_transitions.txt"
      - "heat_transfer_mechanisms.txt"
      - "non_equilibrium_thermodynamics.txt"

  # ── Chemical Bonding ────────────────────────────────────────────────
  - node_id: "chemical-bonding"
    corpus_dir: "chemical_bonding"
    state: "Live"
    metadata:
      description: "Chemical bonds: ionic, covalent, metallic, van der Waals, molecular orbital theory"
      persona: "experimentalist"
    corpus_files:
      - "ionic_bonding.txt"
      - "covalent_bonding.txt"
      - "metallic_bonding.txt"
      - "hydrogen_bonding.txt"
      - "van_der_waals_forces.txt"
      - "valence_bond_theory.txt"
      - "molecular_orbital_theory.txt"
      - "coordination_chemistry.txt"

  # ── Reaction Kinetics ───────────────────────────────────────────────
  - node_id: "reaction-kinetics"
    corpus_dir: "reaction_kinetics"
    state: "Live"
    metadata:
      description: "Chemical reaction rates, catalysis, collision theory, oscillating reactions"
      persona: "experimentalist"
    corpus_files:
      - "rate_laws_and_reaction_order.txt"
      - "collision_theory.txt"
      - "transition_state_theory.txt"
      - "catalysis_mechanisms.txt"
      - "chain_reactions.txt"
      - "photochemical_reactions.txt"
      - "oscillating_reactions.txt"
      - "diffusion_and_transport.txt"

  # ── Stellar Dynamics ────────────────────────────────────────────────
  - node_id: "stellar-dynamics"
    corpus_dir: "stellar_dynamics"
    state: "Live"
    metadata:
      description: "Stellar evolution, nuclear fusion, supernovae, neutron stars"
      persona: "professor"
    corpus_files:
      - "stellar_structure_and_equilibrium.txt"
      - "nuclear_fusion_in_stars.txt"
      - "stellar_evolution_main_sequence.txt"
      - "red_giants_and_stellar_death.txt"
      - "supernovae.txt"
      - "white_dwarfs_neutron_stars.txt"
      - "binary_star_systems.txt"
      - "stellar_populations_and_metallicity.txt"

  # ── Evolution ───────────────────────────────────────────────────────
  - node_id: "evolution"
    corpus_dir: "evolution"
    state: "Live"
    metadata:
      description: "Biological evolution: natural selection, speciation, evo-devo, gene transfer"
      persona: "neutral"
    corpus_files:
      - "natural_selection_mechanism.txt"
      - "genetic_drift_and_neutral_evolution.txt"
      - "speciation_and_reproductive_isolation.txt"
      - "sexual_selection.txt"
      - "coevolution_and_arms_races.txt"
      - "horizontal_gene_transfer.txt"
      - "evo_devo.txt"
      - "major_evolutionary_transitions.txt"

  # ── Emergence ───────────────────────────────────────────────────────
  - node_id: "emergence"
    corpus_dir: "emergence"
    state: "Live"
    metadata:
      description: "Emergent phenomena: complex systems, swarms, cellular automata, neural networks"
      persona: "philosopher"
    corpus_files:
      - "what_is_emergence.txt"
      - "emergence_in_complex_systems.txt"
      - "emergence_and_downward_causation.txt"
      - "cellular_automata_and_emergence.txt"
      - "flocking_and_swarm_behavior.txt"
      - "emergence_in_ant_colonies.txt"
      - "emergence_in_neural_networks.txt"
      - "phase_transitions_as_emergence.txt"

  # ── Consciousness ───────────────────────────────────────────────────
  - node_id: "consciousness"
    corpus_dir: "consciousness"
    state: "Live"
    metadata:
      description: "Theories of consciousness: hard problem, IIT, global workspace, machine consciousness"
      persona: "philosopher"

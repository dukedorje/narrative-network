      - "consciousness_and_time.txt"
      - "machine_consciousness.txt"

  # ── Epistemology ────────────────────────────────────────────────────
  - node_id: "epistemology"
    corpus_dir: "epistemology"
    state: "Live"
    metadata:
      description: "Theory of knowledge: JTB, skepticism, naturalized epistemology, social epistemology"
      persona: "philosopher"
    corpus_files:

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: domain-miner
  namespace: narrative-network
  labels:
    app: domain-miner
    app.kubernetes.io/part-of: narrative-network
spec:
  replicas: 1
  selector:
    matchLabels:
      app: domain-miner
  template:
    metadata:
      labels:
        app: domain-miner
    spec:
      containers:
        - name: domain-miner
          image: narrative-network-domain-miner:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: axon
              containerPort: 8091
              protocol: TCP
          envFrom:
            - configMapRef:
                name: narrative-network-config
            - secretRef:
                name: narrative-network-secrets
          env:
            - name: CORPUS_PATH
              value: /corpus
          volumeMounts:
            - name: corpus-data
              mountPath: /corpus
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              # Embedding model kept in memory
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: axon
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: axon
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: corpus-data
          persistentVolumeClaim:
            claimName: domain-miner-corpus
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: domain-miner-corpus
  namespace: narrative-network
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: domain-miner
  namespace: narrative-network
  labels:
    app: domain-miner
    app.kubernetes.io/part-of: narrative-network
spec:
  selector:
    app: domain-miner
  ports:
    - name: axon
      port: 8091
      targetPort: axon
      protocol: TCP
  type: ClusterIP

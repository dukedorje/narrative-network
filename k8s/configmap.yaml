apiVersion: v1
kind: ConfigMap
metadata:
  name: narrative-network-config
  namespace: narrative-network
  labels:
    app.kubernetes.io/part-of: narrative-network
data:
  # Bittensor
  AXON_NETUID: "42"
  AXON_NETWORK: "local"

  # Embedding
  AXON_EMBEDDING_MODEL: "sentence-transformers/all-mpnet-base-v2"
  AXON_EMBEDDING_DIM: "768"
  AXON_EMBEDDING_BATCH_SIZE: "32"

  # OpenRouter / Narrative miner
  AXON_OPENROUTER_BASE_URL: "https://openrouter.ai/api/v1"
  AXON_OPENROUTER_MODEL: "openrouter/auto"
  AXON_NARRATIVE_MAX_TOKENS: "400"
  AXON_NARRATIVE_TEMPERATURE: "0.75"

  # Scoring weights
  AXON_TRAVERSAL_WEIGHT: "0.40"
  AXON_QUALITY_WEIGHT: "0.30"
  AXON_TOPOLOGY_WEIGHT: "0.15"
  AXON_CORPUS_WEIGHT: "0.15"

  # Traversal
  AXON_LATENCY_SOFT_LIMIT_S: "3.0"
  AXON_LATENCY_PENALTY_PER_S: "0.1"
  AXON_LATENCY_MAX_PENALTY: "0.5"

  # Topology
  AXON_EDGE_DECAY_RATE: "0.995"
  AXON_EDGE_DECAY_FLOOR: "0.01"

  # Validator
  AXON_EPOCH_SLEEP_S: "60"
  AXON_MOVING_AVERAGE_ALPHA: "0.1"
  AXON_CHALLENGE_SAMPLE_SIZE: "10"

  # Gateway URL (cluster-internal for frontend → gateway calls)
  GATEWAY_URL: "http://gateway.narrative-network.svc.cluster.local"

  # Orchestrator
  AXON_ORCHESTRATOR_MAX_HOPS: "8"
  AXON_ORCHESTRATOR_MIN_MINERS: "3"
  AXON_ORCHESTRATOR_TIMEOUT_S: "12.0"

  # Evolution
  AXON_PROPOSAL_MIN_BOND_TAO: "1.0"
  AXON_VOTING_OPEN_BLOCKS: "7200"
  AXON_VOTING_QUORUM_RATIO: "0.10"
  AXON_VOTING_PASS_RATIO: "0.60"
  AXON_INCUBATION_BLOCKS: "1800"
  AXON_PRUNING_MIN_EDGE_WEIGHT: "0.05"
  AXON_PRUNING_MIN_TRAVERSALS: "5"
  AXON_PRUNING_INTERVAL_BLOCKS: "3600"
  AXON_DRIFT_MAX_COSINE_DISTANCE: "0.35"
  AXON_INTEGRATION_BLOCKS: "600"
  AXON_INTEGRATION_MIN_SCORE: "0.50"

  # Emission pool shares
  AXON_EMISSION_TRAVERSAL_SHARE: "0.50"
  AXON_EMISSION_QUALITY_SHARE: "0.30"
  AXON_EMISSION_TOPOLOGY_SHARE: "0.20"

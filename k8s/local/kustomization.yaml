apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base
  - local-validator.yaml

patches:
  # --- Remove production-only resources ---
  - target:
      kind: Ingress
    patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: unused
  - target:
      kind: Middleware
    patch: |
      $patch: delete
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: unused
  - target:
      kind: ClusterIssuer
    patch: |
      $patch: delete
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: unused
  - target:
      kind: StatefulSet
      name: validator
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: validator
  - target:
      kind: Service
      name: validator
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: validator
  - target:
      kind: Secret
      name: narrative-network-secrets
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata:
        name: narrative-network-secrets
  - target:
      kind: Deployment
      name: miner
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: miner
  - target:
      kind: Service
      name: miner
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: miner

  # --- Scale down replicas for local dev ---
  - target:
      kind: Deployment
      name: gateway
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  # --- Remove HPA (not useful locally) ---
  - target:
      kind: HorizontalPodAutoscaler
      name: gateway-hpa
    patch: |
      $patch: delete
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: gateway-hpa

  # --- Reduce resource requests/limits for local ---
  - target:
      kind: Deployment
      name: gateway
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"

  # --- Frontend: set ORIGIN for local dev ---
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "http://localhost:3000"

  # --- Relax gateway probes (model download can be slow on first start) ---
  - target:
      kind: Deployment
      name: gateway
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/initialDelaySeconds
        value: 120
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/periodSeconds
        value: 30
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/failureThreshold
        value: 10
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/initialDelaySeconds
        value: 60
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/failureThreshold
        value: 10

  # --- Expose frontend and gateway as NodePort for kind extraPortMappings ---
  - target:
      kind: Service
      name: frontend
    patch: |
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30080
  - target:
      kind: Service
      name: gateway
    patch: |
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30081

  # --- Use local gateway image (no bittensor) ---
  - target:
      kind: Deployment
      name: gateway
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "narrative-network-gateway-local:latest"
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: AXON_NETWORK
            value: "local"

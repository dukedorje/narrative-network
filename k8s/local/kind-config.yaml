kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      # Frontend: localhost:3000 -> nodePort 30080
      - containerPort: 30080
        hostPort: 3000
        protocol: TCP
      # Gateway API: localhost:8080 -> nodePort 30081
      - containerPort: 30081
        hostPort: 8080
        protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: narrative-miner
  namespace: narrative-network
  labels:
    app: narrative-miner
    app.kubernetes.io/part-of: narrative-network
spec:
  replicas: 1
  selector:
    matchLabels:
      app: narrative-miner
  template:
    metadata:
      labels:
        app: narrative-miner
    spec:
      containers:
        - name: narrative-miner
          image: narrative-network-narrative-miner:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: axon
              containerPort: 8093
              protocol: TCP
          envFrom:
            - configMapRef:
                name: narrative-network-config
            - secretRef:
                name: narrative-network-secrets
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: axon
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: axon
            initialDelaySeconds: 5
            periodSeconds: 10
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: narrative-miner
  namespace: narrative-network
  labels:
    app: narrative-miner
    app.kubernetes.io/part-of: narrative-network
spec:
  selector:
    app: narrative-miner
  ports:
    - name: axon
      port: 8093
      targetPort: axon
      protocol: TCP
  type: ClusterIP

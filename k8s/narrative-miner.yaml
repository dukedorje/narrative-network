---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: narrative-miner
  namespace: narrative-network
  labels:
    app: narrative-miner
    app.kubernetes.io/part-of: narrative-network
spec:
  replicas: 1
  selector:
    matchLabels:
      app: narrative-miner
  template:
    metadata:
      labels:
        app: narrative-miner
    spec:
      containers:
        - name: narrative-miner
          image: narrative-network-narrative-miner:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: axon
              containerPort: 8093
              protocol: TCP
          envFrom:
            - configMapRef:
                name: narrative-network-config
            - secretRef:
                name: narrative-network-secrets
          volumeMounts:
            - name: bt-coldkey
              mountPath: /root/.bittensor/wallets/default/coldkey
              subPath: coldkey
              readOnly: true
            - name: bt-coldkey
              mountPath: /root/.bittensor/wallets/default/coldkeypub.txt
              subPath: coldkeypub.txt
              readOnly: true
            - name: bt-hotkey
              mountPath: /root/.bittensor/wallets/default/hotkeys/default
              subPath: hotkey
              readOnly: true
            - name: bt-hotkey
              mountPath: /root/.bittensor/wallets/default/hotkeys/defaultpub.txt
              subPath: hotkeypub.txt
              readOnly: true
          # No GPU needed — uses OpenRouter for LLM inference
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: axon
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: axon
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: bt-coldkey
          secret:
            secretName: bt-wallet-coldkey
        - name: bt-hotkey
          secret:
            secretName: bt-wallet-narrative-miner
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: narrative-miner
  namespace: narrative-network
  labels:
    app: narrative-miner
    app.kubernetes.io/part-of: narrative-network
spec:
  selector:
    app: narrative-miner
  ports:
    - name: axon
      port: 8093
      targetPort: axon
      protocol: TCP
  type: ClusterIP

apiVersion: v1
kind: Secret
metadata:
  name: narrative-network-secrets
  namespace: narrative-network
  labels:
    app.kubernetes.io/part-of: narrative-network
type: Opaque
stringData:
  # Replace these placeholders with actual values before applying.
  # Use: kubectl create secret generic narrative-network-secrets --from-env-file=.env -n narrative-network
  # or seal with kubeseal / external-secrets operator.
  OPENROUTER_API_KEY: "REPLACE_ME"
  DATABASE_URL: "postgresql://user:password@postgres:5432/narrative_network"
  REDIS_URL: "redis://:password@redis:6379/0"
  # Bittensor wallet mnemonic (keep this secret!)
  BT_WALLET_MNEMONIC: "REPLACE_ME"

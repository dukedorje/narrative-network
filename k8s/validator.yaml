---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: validator
  namespace: narrative-network
  labels:
    app: validator
    app.kubernetes.io/part-of: narrative-network
spec:
  serviceName: validator
  replicas: 1
  selector:
    matchLabels:
      app: validator
  template:
    metadata:
      labels:
        app: validator
    spec:
      containers:
        - name: validator
          image: narrative-network-validator:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: narrative-network-config
            - secretRef:
                name: narrative-network-secrets
          env:
            - name: GRAPH_DB_PATH
              value: /data/graph.db
          volumeMounts:
            - name: graph-data
              mountPath: /data
            - name: bt-coldkey
              mountPath: /root/.bittensor/wallets/default/coldkey
              subPath: coldkey
              readOnly: true
            - name: bt-coldkey
              mountPath: /root/.bittensor/wallets/default/coldkeypub.txt
              subPath: coldkeypub.txt
              readOnly: true
            - name: bt-hotkey
              mountPath: /root/.bittensor/wallets/default/hotkeys/default
              subPath: hotkey
              readOnly: true
            - name: bt-hotkey
              mountPath: /root/.bittensor/wallets/default/hotkeys/defaultpub.txt
              subPath: hotkeypub.txt
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "subnet.validator"]
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: bt-coldkey
          secret:
            secretName: bt-wallet-coldkey
        - name: bt-hotkey
          secret:
            secretName: bt-wallet-validator
      terminationGracePeriodSeconds: 60
  volumeClaimTemplates:
    - metadata:
        name: graph-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: validator
  namespace: narrative-network
  labels:
    app: validator
    app.kubernetes.io/part-of: narrative-network
spec:
  selector:
    app: validator
  ports:
    - name: axon
      port: 8091
      targetPort: 8091
      protocol: TCP
  type: ClusterIP
  clusterIP: None

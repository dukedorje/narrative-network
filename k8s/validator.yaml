---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: validator
  namespace: narrative-network
  labels:
    app: validator
    app.kubernetes.io/part-of: narrative-network
spec:
  serviceName: validator
  replicas: 1
  selector:
    matchLabels:
      app: validator
  template:
    metadata:
      labels:
        app: validator
    spec:
      containers:
        - name: validator
          image: narrative-network-validator:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: narrative-network-config
            - secretRef:
                name: narrative-network-secrets
          env:
            - name: GRAPH_DB_PATH
              value: /data/graph.db
          volumeMounts:
            - name: graph-data
              mountPath: /data
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            exec:
              command: ["python", "-c", "import subnet.validator; print('ok')"]
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
  volumeClaimTemplates:
    - metadata:
        name: graph-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: validator
  namespace: narrative-network
  labels:
    app: validator
    app.kubernetes.io/part-of: narrative-network
spec:
  selector:
    app: validator
  ports:
    - name: axon
      port: 8091
      targetPort: 8091
      protocol: TCP
  type: ClusterIP
  clusterIP: None

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ipfs
  namespace: narrative-network
  labels:
    app: ipfs
    app.kubernetes.io/part-of: narrative-network
spec:
  serviceName: ipfs
  replicas: 1
  selector:
    matchLabels:
      app: ipfs
  template:
    metadata:
      labels:
        app: ipfs
    spec:
      initContainers:
        - name: ipfs-init
          image: ipfs/kubo:v0.28.0
          command: ["ipfs", "init"]
          env:
            - name: IPFS_PATH
              value: /data/ipfs
          volumeMounts:
            - name: ipfs-data
              mountPath: /data/ipfs
      containers:
        - name: ipfs
          image: ipfs/kubo:v0.28.0
          env:
            - name: IPFS_PATH
              value: /data/ipfs
          ports:
            - name: swarm
              containerPort: 4001
              protocol: TCP
            - name: swarm-udp
              containerPort: 4001
              protocol: UDP
            - name: api
              containerPort: 5001
              protocol: TCP
            - name: gateway
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: ipfs-data
              mountPath: /data/ipfs
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/v0/version
              port: api
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v0/version
              port: api
            initialDelaySeconds: 10
            periodSeconds: 15
      terminationGracePeriodSeconds: 60
  volumeClaimTemplates:
    - metadata:
        name: ipfs-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ipfs
  namespace: narrative-network
  labels:
    app: ipfs
    app.kubernetes.io/part-of: narrative-network
spec:
  selector:
    app: ipfs
  ports:
    - name: swarm
      port: 4001
      targetPort: swarm
      protocol: TCP
    - name: api
      port: 5001
      targetPort: api
      protocol: TCP
    - name: gateway
      port: 8080
      targetPort: gateway
      protocol: TCP
  type: ClusterIP
  clusterIP: None

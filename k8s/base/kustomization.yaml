apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: narrative-network

resources:
  - namespace.yaml
  - configmap.yaml
  # secrets.yaml excluded — use `just secrets` to push from .env
  - gateway.yaml
  - validator.yaml
  - miner.yaml
  - frontend.yaml
  - redis.yaml
  - ipfs.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: narrative-network

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: miner
  namespace: narrative-network
  labels:
    app: miner
    app.kubernetes.io/part-of: narrative-network
spec:
  replicas: 1
  selector:
    matchLabels:
      app: miner
  template:
    metadata:
      labels:
        app: miner
    spec:
      containers:
        - name: miner
          image: narrative-network-miner:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: axon
              containerPort: 8091
              protocol: TCP
          envFrom:
            - configMapRef:
                name: narrative-network-config
            - secretRef:
                name: narrative-network-secrets
          volumeMounts:
            - name: embedding-cache
              mountPath: /data/embedding_cache
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: axon
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: axon
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: embedding-cache
          emptyDir:
            sizeLimit: 500Mi
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: miner
  namespace: narrative-network
  labels:
    app: miner
    app.kubernetes.io/part-of: narrative-network
spec:
  selector:
    app: miner
  ports:
    - name: axon
      port: 8091
      targetPort: axon
      protocol: TCP
  type: ClusterIP

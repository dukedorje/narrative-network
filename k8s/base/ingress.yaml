---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: narrative-network-ingress
  namespace: narrative-network
  labels:
    app.kubernetes.io/part-of: narrative-network
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - futograph.online
        - www.futograph.online
      secretName: futograph-tls
  rules:
    - host: futograph.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  name: http
    - host: www.futograph.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  name: http
---
# Strip /gateway prefix before forwarding to the gateway service
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-gateway
  namespace: narrative-network
spec:
  stripPrefix:
    prefixes:
      - /gateway
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway-ingress
  namespace: narrative-network
  labels:
    app.kubernetes.io/part-of: narrative-network
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: narrative-network-strip-gateway@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - futograph.online
        - www.futograph.online
      secretName: futograph-tls
  rules:
    - host: futograph.online
      http:
        paths:
          - path: /gateway
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  name: http
    - host: www.futograph.online
      http:
        paths:
          - path: /gateway
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  name: http

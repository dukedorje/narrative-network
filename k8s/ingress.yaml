---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: narrative-network-ingress
  namespace: narrative-network
  labels:
    app.kubernetes.io/part-of: narrative-network
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - futograph.online
        - www.futograph.online
      secretName: futograph-tls
  rules:
    - host: futograph.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  name: http
    - host: www.futograph.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  name: http

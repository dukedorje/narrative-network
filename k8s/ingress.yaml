---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: narrative-network-ingress
  namespace: narrative-network
  labels:
    app.kubernetes.io/part-of: narrative-network
  annotations:
    # nginx ingress controller annotations
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket upgrade support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # TLS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
spec:
  tls:
    - hosts:
        - api.narrative.network
        - app.narrative.network
      # Replace with your TLS secret name (e.g. created by cert-manager)
      secretName: narrative-network-tls
  rules:
    - host: api.narrative.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  name: http
    - host: app.narrative.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  name: http
